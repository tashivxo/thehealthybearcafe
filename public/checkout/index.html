<body class="antialiased min-h-screen flex flex-col items-center" data-page="checkout">
<!-- TopAppBar -->
<header class="w-full bg-surface text-primary border-b border-outline-variant fixed top-0 z-50 px-margin-mobile md:px-margin-desktop py-sm shadow-sm">
<div class="max-w-[600px] mx-auto flex justify-between items-center gap-md h-10">
<button aria-label="Go back" class="text-on-surface-variant hover:bg-surface-container-high p-2 rounded-full transition-colors shrink-0" data-action="go-back" data-fallback="/menu" id="back-button" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-headline-sm-mobile font-headline-sm font-bold text-primary truncate mx-4 text-center">
            Checkout
        </div>
<div class="w-10"></div>
</div>
<nav aria-label="Primary" class="max-w-[600px] mx-auto mt-sm flex items-center gap-xs overflow-x-auto no-scrollbar">
<a aria-label="Home" class="rounded-full border border-outline-variant bg-surface-container-low px-4 py-2 text-label-sm font-label-sm text-on-surface-variant transition-colors hover:bg-surface-container-high hover:text-on-surface whitespace-nowrap" data-route="/" href="/">Home</a>
<a aria-label="Menu" class="rounded-full border border-outline-variant bg-surface-container-low px-4 py-2 text-label-sm font-label-sm text-on-surface-variant transition-colors hover:bg-surface-container-high hover:text-on-surface whitespace-nowrap" data-route="/menu" href="/menu">Menu</a>
<a aria-current="page" aria-label="Checkout" class="rounded-full bg-primary px-4 py-2 text-label-sm font-label-sm text-on-primary shadow-sm whitespace-nowrap" data-route="/checkout" href="/checkout">Checkout</a>
<a aria-label="Orders" class="rounded-full border border-outline-variant bg-surface-container-low px-4 py-2 text-label-sm font-label-sm text-on-surface-variant transition-colors hover:bg-surface-container-high hover:text-on-surface whitespace-nowrap" data-route="/orders" href="/orders">Orders</a>
</nav>
</header>
<!-- Main Content -->
<main class="w-full max-w-[600px] mt-28 mb-24 px-margin-mobile py-lg flex flex-col gap-xl">
<!-- Order Summary -->
<section class="flex flex-col gap-md">
<h2 class="text-headline-sm font-headline-sm text-on-surface">Order Summary</h2>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm" id="order-summary-card">
<div class="flex flex-col gap-sm" id="order-summary-items"></div>
<div class="flex justify-between items-center pt-2 mt-2 border-t border-surface-variant" id="subtotal-row">
<span class="text-headline-sm font-headline-sm text-on-surface">Subtotal</span>
<span class="text-headline-sm font-headline-sm text-primary" id="subtotal-amount">R0.00</span>
</div>
</div>
</section>
<!-- Pickup Time -->
<section class="flex flex-col gap-md">
<h2 class="text-headline-sm font-headline-sm text-on-surface">Pickup Time</h2>
<div class="grid grid-cols-2 gap-sm">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="pickup_time" type="radio"/>
<div class="w-full text-center py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant peer-checked:bg-on-surface peer-checked:text-on-primary peer-checked:border-on-surface transition-colors">
<span class="text-body-sm font-body-sm block">Asap</span>
<span class="text-label-sm font-label-sm block mt-xs opacity-80">~15 mins</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="pickup_time" type="radio"/>
<div class="w-full text-center py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant peer-checked:bg-on-surface peer-checked:text-on-primary peer-checked:border-on-surface transition-colors">
<span class="text-body-sm font-body-sm block">Schedule</span>
<span class="text-label-sm font-label-sm block mt-xs opacity-80">Select time</span>
</div>
</label>
</div>
<!-- Hidden by default, would show if 'Schedule' selected -->
<div class="flex gap-sm overflow-x-auto pb-2 hidden" id="time-slots">
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-body-sm font-body-sm text-on-surface">10:30 AM</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-body-sm font-body-sm text-on-surface">11:00 AM</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-body-sm font-body-sm text-on-surface">11:30 AM</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-body-sm font-body-sm text-on-surface">12:00 PM</button>
</div>
</section>
<!-- Payment Method -->
<section class="flex flex-col gap-md">
<h2 class="text-headline-sm font-headline-sm text-on-surface">Payment Method</h2>
<div class="flex flex-col gap-sm">
<label class="flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-lowest cursor-pointer">
<input checked="" class="w-5 h-5 text-primary border-outline-variant focus:ring-primary focus:ring-offset-surface-container-lowest" name="payment_method" type="radio"/>
<span class="material-symbols-outlined text-on-surface-variant">credit_card</span>
<span class="text-body-lg font-body-lg text-on-surface flex-1">Credit / Debit Card</span>
</label>
<label class="flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-lowest cursor-pointer">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary focus:ring-offset-surface-container-lowest" name="payment_method" type="radio"/>
<span class="material-symbols-outlined text-on-surface-variant">account_balance_wallet</span>
<span class="text-body-lg font-body-lg text-on-surface flex-1">Apple Pay</span>
</label>
<label class="flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-lowest cursor-pointer">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary focus:ring-offset-surface-container-lowest" name="payment_method" type="radio"/>
<span class="material-symbols-outlined text-on-surface-variant">payments</span>
<span class="text-body-lg font-body-lg text-on-surface flex-1">Cash on Pickup</span>
</label>
</div>
</section>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-margin-mobile flex justify-center z-50 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<div class="w-full max-w-[600px] flex justify-between items-center gap-md">
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-on-surface-variant">Total</span>
<span class="text-headline-md font-headline-md text-primary" id="checkout-total">R0.00</span>
</div>
<button class="bg-primary hover:bg-surface-tint text-on-primary text-headline-sm font-headline-sm py-3 px-8 rounded-full min-h-[48px] flex-1 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" data-action="place-order" data-href="/orders" id="place-order-button" type="button">
                Place Order
            </button>
</div>
</div>
<script src="../scripts/main.js"></script>
</body></html>
