<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Confirmation - The Healthy Bear Cafe</title>

                        "inverse-surface": "#303031",
                        "surface-variant": "#e4e2e2",
                        "on-surface": "#1b1c1c",
                        "secondary-fixed-dim": "#c6c6c6",
                        "on-primary": "#ffffff",
                        "on-background": "#1b1c1c",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-container": "#efeded",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e2e2e2",
                        "surface-container-highest": "#e4e2e2",
                        "surface": "#fbf9f8",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#005228",

                    "spacing": {

                        "md": "16px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen font-body-lg flex flex-col md:max-w-[1200px] md:mx-auto">
<!-- Header (Suppressed navigation, showing close intent) -->
<header class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-14 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[24px]">restaurant_menu</span>
<span class="text-headline-sm-mobile md:text-headline-sm font-headline-sm font-bold text-primary">The Healthy Bear Cafe</span>
</div>
<button class="p-xs rounded-full hover:bg-surface-container-high text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center px-margin-mobile md:px-margin-desktop py-xl md:py-20">
<!-- Success Animation/Icon Area -->
<div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="text-display-lg-mobile md:text-display-lg font-display-lg-mobile md:font-display-lg text-center mb-xs">Order Received!</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant mb-xl text-center">Thank you for your order. We're getting it ready.</p>
<!-- Order Summary Card -->
<div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-xl p-lg mb-xl shadow-sm">
<div class="flex justify-between items-center border-b border-outline-variant pb-md mb-md">
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Order Number</span>
<span class="text-headline-sm font-headline-sm text-on-surface">#HB-1024</span>
</div>
<div class="flex flex-col items-end">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Est. Pickup</span>
<span class="text-headline-sm font-headline-sm text-primary">15 mins</span>
</div>
</div>
<!-- Progress Tracker -->
<div class="relative py-md">
<div class="absolute left-[15px] top-md bottom-md w-[2px] bg-surface-variant rounded-full -z-10"></div>
<!-- Step 1: Active/Completed -->
<div class="flex items-center gap-md mb-lg">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center z-10 shrink-0">
<span class="material-symbols-outlined text-on-primary text-[18px]" style="font-variation-settings: 'FILL' 1;">done</span>
</div>
<div class="flex flex-col">
<span class="text-body-lg font-body-lg font-bold text-on-surface">Order Placed</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">We've received your order.</span>
</div>
</div>
<!-- Step 2: Current -->
<div class="flex items-center gap-md mb-lg">
<div class="w-8 h-8 rounded-full border-2 border-primary bg-surface flex items-center justify-center z-10 shrink-0">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
<div class="flex flex-col">
<span class="text-body-lg font-body-lg font-bold text-primary">Preparing</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">Your food is being made.</span>
</div>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant bg-surface flex items-center justify-center z-10 shrink-0">
<span class="material-symbols-outlined text-outline-variant text-[18px]">shopping_bag</span>
</div>
<div class="flex flex-col">
<span class="text-body-lg font-body-lg text-on-surface-variant">Ready for Pickup</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">Head to the counter soon.</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full max-w-md h-12 bg-surface border border-on-surface text-on-surface rounded-DEFAULT text-label-bold font-label-bold flex items-center justify-center hover:bg-surface-container-high transition-colors">
            Back to Menu
        </button>
</main>
</body></html>
